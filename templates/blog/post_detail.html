{% extends 'base.html' %}
{% load static %}

{% block content %}
    <!-- Hero / Header Section -->
    <section class="py-5 mt-5 position-relative overflow-hidden text-white" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('{% if post.featured_image %}{{ post.featured_image.url }}{% else %}https://jkrintl.com/wp-content/uploads/2022/12/JKR-Banner-2.jpg{% endif %}'); background-size: cover; background-position: center; min-height: 40vh; display: flex; align-items: center; justify-content: center;">
        <div class="container py-5 text-center px-4">
            <h1 class="display-3 font-weight-bold" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">{{ post.title }}</h1>
        </div>
    </section>

    <!-- Breadcrumbs Section -->
    <nav aria-label="breadcrumb" class="bg-light py-3 border-bottom shadow-sm">
        <div class="container">
            <ol class="breadcrumb bg-transparent p-0 mb-0 px-4" style="font-size: 0.9rem;">
                <li class="breadcrumb-item"><a href="{% url 'core:home' %}" class="text-secondary text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="{% url 'blog:post_list' %}" class="text-secondary text-decoration-none">Blogs</a></li>
                <li class="breadcrumb-item active text-dark font-weight-bold" aria-current="page">{{ post.title }}</li>
            </ol>
        </div>
    </nav>

    <!-- Blog Content Section -->
    <article class="py-5 bg-white">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-10 shadow-sm border p-4 p-md-5 bg-white" style="border-radius: 20px;">
                    <div class="d-flex align-items-center mb-5 text-muted small border-bottom pb-4">
                        <span class="mr-4"><i class="far fa-calendar-alt mr-2 text-primary"></i> {{ post.created_at|date:"F j, Y" }}</span>
                        <span class="badge badge-success px-3 py-1 text-white"># Medical Insights</span>
                    </div>

                    {% if post.excerpt %}
                    <div class="lead font-italic mb-5 border-left pl-4 py-2" style="border-width: 4px !important; border-color: #6cce95 !important;">
                        {{ post.excerpt }}
                    </div>
                    {% endif %}

                    <div class="blog-content text-dark" style="line-height: 1.8; font-size: 1.1rem;">
                        {{ post.content|safe }}
                    </div>
                    
                    <hr class="my-5 bg-light">
                    
                    <div class="mt-5 d-flex justify-content-between align-items-center">
                        <a href="{% url 'blog:post_list' %}" class="btn btn-outline-primary px-4 py-2" style="border-radius: 30px;"><i class="fa fa-arrow-left mr-2"></i> All Blogs</a>
                        
                        <div class="share-icons">
                            <span class="text-muted small font-weight-bold mr-3">SHARE:</span>
                            <a href="#" class="text-primary mr-3"><i class="fab fa-facebook-f"></i></a>
                            <a href="#" class="text-info mr-3"><i class="fab fa-twitter"></i></a>
                            <a href="#" class="text-success mr-3"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </article>

    <style>
        .blog-content img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 2rem 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .blog-content h2, .blog-content h3 {
            color: var(--primary-blue);
            margin-top: 2.5rem;
            font-weight: 700;
        }
        .blog-content p {
            margin-bottom: 1.5rem;
        }
    </style>
{% endblock %}
