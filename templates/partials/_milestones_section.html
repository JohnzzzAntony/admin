<!-- Milestones/Counters Section -->
<section class="py-5 bg-white border-top border-bottom">
    <div class="container py-5 text-center">
        <div class="row">
            {% for counter in counters %}
            <div class="col-md-3 mb-4" data-aos="fade-up" data-aos-delay="{% widthratio forloop.counter0 1 100 %}">
                <div class="counter-box p-4 rounded-lg bg-white shadow-sm border border-light hover-lift" style="border-radius: 25px;">
                    {% if counter.icon_svg %}
                    <div class="counter-icon mb-3" style="font-size: 2rem; color: var(--primary-blue); max-height: 50px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        {{ counter.icon_svg|safe }}
                    </div>
                    {% endif %}
                    <h1 class="display-3 font-weight-bold counter-value mb-2 text-dark">{{ counter.value }}</h1>
                    <p class="h5 font-weight-bold text-primary">{{ counter.title }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
